<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Painel de Leitura Individual · WS Consultoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#14222A; --petrol:#20505C; --petrol-700:#173B45; --petrol-900:#10282F;
    --accent:#C98A3C; --accent-soft:#F3E6D2;
    --mist:#F4F7F7; --surface:#FFFFFF; --line:#DCE6E6; --line-strong:#C3D2D2;
    --muted:#5E7077; --muted-2:#7E8E93;
    --d:#C0492F; --i:#D9A227; --s:#2F7D5B; --c:#2E6E8E;
    --radius:14px; --shadow:0 1px 2px rgba(20,34,42,.04),0 8px 28px rgba(20,34,42,.06);
    --shadow-lg:0 14px 50px rgba(16,40,47,.28);
    --maxw:880px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--mist);line-height:1.55;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px 90px;}

  .topbar{
    position:sticky;top:0;z-index:30;background:rgba(244,247,247,.9);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  .topbar__in{max-width:var(--maxw);margin:0 auto;padding:13px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;}
  .brand{font-family:"Fraunces",serif;font-weight:600;font-size:16px;color:var(--petrol-700);}
  .brand b{color:var(--accent);}
  .brand span{font-weight:400;color:var(--muted);font-size:13px;margin-left:8px;font-family:"Inter",sans-serif;}
  .topbar__actions{display:flex;gap:9px;}
  .tbtn{font:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:9px;padding:8px 14px;border:1px solid var(--line-strong);background:#fff;color:var(--petrol-700);transition:.12s;}
  .tbtn:hover{border-color:var(--petrol);}
  .tbtn.primary{background:var(--petrol);color:#fff;border-color:var(--petrol);}
  .tbtn.primary:hover{background:var(--petrol-700);}

  /* loader */
  .loader{padding:64px 0 30px;text-align:center;}
  .loader h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(28px,6vw,40px);margin:0 0 12px;}
  .loader h1 em{font-style:italic;color:var(--petrol);}
  .loader p{color:var(--muted);font-size:16px;max-width:54ch;margin:0 auto 32px;}
  .drop{
    border:2px dashed var(--line-strong);border-radius:18px;background:var(--surface);
    padding:46px 28px;cursor:pointer;transition:.15s;max-width:540px;margin:0 auto;
  }
  .drop:hover,.drop.over{border-color:var(--accent);background:#FCFAF6;}
  .drop svg{margin-bottom:14px;}
  .drop b{display:block;font-size:16px;color:var(--ink);margin-bottom:5px;}
  .drop span{font-size:13.5px;color:var(--muted-2);}
  /* navegação */
  .nav{position:sticky;top:0;z-index:40;background:var(--petrol-900);}
  .nav__in{max-width:var(--maxw);margin:0 auto;padding:0 22px;display:flex;align-items:center;gap:18px;height:60px;}
  .nav .brand{color:#fff;} .nav .brand b{color:var(--accent);} .nav .brand span{color:#9DB3B5;}
  .tabs{display:flex;gap:4px;margin-left:auto;}
  .tab{font:inherit;font-size:14px;font-weight:600;color:#AFC2C4;background:none;border:none;cursor:pointer;padding:9px 16px;border-radius:9px;transition:.12s;}
  .tab:hover{color:#fff;background:rgba(255,255,255,.06);}
  .tab.is-on{color:#fff;background:var(--petrol);}
  .pdfbtn{margin-left:10px;}
  @media (max-width:600px){
    .nav__in{flex-wrap:wrap;height:auto;padding:10px 16px;gap:10px;}
    .tabs{margin-left:0;width:100%;} .tab{flex:1;text-align:center;padding:9px 8px;}
    .brand span{display:none;}
  }

  /* carregamento */
  .boot{padding:90px 0;text-align:center;}
  .boot__spin{width:34px;height:34px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;margin:0 auto 18px;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .boot__txt{font-size:15px;color:var(--muted);} .boot__txt.err{color:var(--d);}
  .boot__fallback{margin-top:24px;}

  /* dashboard */
  .dash__hero{padding:34px 0 22px;}
  .dash__hero .eyebrow{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;}
  .dash__hero h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(28px,5vw,38px);margin:0 0 8px;line-height:1.1;}
  .dash__hero h1 em{font-style:italic;color:var(--petrol);}
  .dash__hero p{color:var(--muted);font-size:15.5px;margin:0;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:8px;}
  @media (max-width:600px){.stats{grid-template-columns:1fr;}}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;}
  .stat__lbl{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px;}
  .stat__val{font-family:"Fraunces",serif;font-weight:700;font-size:30px;color:var(--petrol-700);line-height:1.1;}
  .stat__val small{font-size:14px;color:var(--muted-2);font-weight:400;font-family:"Inter",sans-serif;}
  .cta{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-top:14px;}
  @media (max-width:600px){.cta{grid-template-columns:1fr;}}
  .ctabtn{display:flex;align-items:center;justify-content:space-between;gap:12px;background:var(--petrol);color:#fff;border:none;cursor:pointer;border-radius:var(--radius);padding:18px 22px;font:inherit;font-size:16px;font-weight:600;box-shadow:0 8px 22px rgba(32,80,92,.18);transition:.12s;}
  .ctabtn:hover{background:var(--petrol-700);} .ctabtn span.arr{font-size:20px;}
  .ctabtn.alt{background:var(--surface);color:var(--petrol-700);border:1px solid var(--line-strong);box-shadow:var(--shadow);}
  .ctabtn.alt:hover{border-color:var(--petrol);}

  /* DISC team + gauges + roster (compartilhado com equipe) */
  .discteam{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;}
  @media (max-width:640px){.discteam{grid-template-columns:1fr 1fr;}}
  .dt{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 14px;text-align:center;}
  .dt__L{font-family:"Fraunces",serif;font-weight:700;font-size:28px;line-height:1;color:#fff;width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin:0 auto 9px;}
  .dt__n{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);}
  .dt__count{font-family:"Fraunces",serif;font-weight:700;font-size:26px;color:var(--ink);margin-top:5px;}
  .dt__count small{font-size:12px;color:var(--muted-2);font-weight:400;font-family:"Inter",sans-serif;}
  .cards2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media (max-width:640px){.cards2{grid-template-columns:1fr;}}
  .panelc{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;}
  .panelc h4{margin:0 0 12px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--petrol);}
  .hl{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-top:1px solid var(--line);font-size:14px;}
  .hl:first-of-type{border-top:none;} .hl b{font-weight:600;} .hl .v{font-weight:700;font-variant-numeric:tabular-nums;color:var(--petrol-700);}
  .gap{background:var(--petrol-900);color:#EAF1F1;border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:18px 22px;}
  .gap h4{margin:0 0 8px;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}
  .gap p{margin:0;font-size:14px;line-height:1.55;color:#DCE7E7;} .gap b{color:#fff;}
  .mot{display:grid;gap:9px;}
  .motrow{display:grid;grid-template-columns:200px 1fr 34px;gap:10px;align-items:center;font-size:13.5px;}
  @media (max-width:560px){.motrow{grid-template-columns:130px 1fr 30px;}}
  .motrow .bar{height:10px;border-radius:99px;background:var(--accent);min-width:3px;}
  .motrow .bart{background:var(--mist);border-radius:99px;overflow:hidden;}
  .motrow .num{text-align:right;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;}
  table.roster{width:100%;border-collapse:collapse;font-size:13.5px;margin-top:4px;}
  table.roster th{text-align:left;font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-2);padding:9px 10px;border-bottom:2px solid var(--line-strong);}
  table.roster td{padding:10px;border-bottom:1px solid var(--line);}
  table.roster tr:last-child td{border-bottom:none;} table.roster .nm{font-weight:600;}
  .pill{display:inline-block;font-weight:700;font-size:12px;padding:2px 9px;border-radius:99px;color:#fff;}

  /* picker individual */
  .picker{display:flex;gap:9px;align-items:center;margin:26px 0 4px;}
  .picker__lbl{font-size:13px;font-weight:700;color:var(--muted);}
  .select{flex:1;max-width:380px;font:inherit;font-size:15px;color:var(--ink);padding:11px 13px;border:1px solid var(--line-strong);border-radius:11px;background:#fff;cursor:pointer;}
  .select:focus{outline:none;border-color:var(--petrol);box-shadow:0 0 0 3px rgba(32,80,92,.12);}
  .or{max-width:520px;margin:22px auto 16px;text-align:center;font-size:12.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.1em;position:relative;}
  .or::before,.or::after{content:"";position:absolute;top:50%;width:32%;height:1px;background:var(--line);}
  .or::before{left:0;} .or::after{right:0;}
  .paste-toggle{margin-top:20px;font-size:13.5px;color:var(--petrol);text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;}
  .pastebox{display:none;max-width:540px;margin:18px auto 0;}
  .pastebox.show{display:block;}
  .pastebox textarea{width:100%;height:120px;border:1px solid var(--line-strong);border-radius:11px;padding:12px;font-family:ui-monospace,monospace;font-size:12px;resize:vertical;}
  .err{color:var(--d);font-size:14px;margin-top:16px;font-weight:500;display:none;}
  .err.show{display:block;}

  /* report */
  .report{display:none;padding-top:30px;}
  .report.show{display:block;}

  .rhead{display:flex;align-items:flex-start;gap:18px;flex-wrap:wrap;border-bottom:2px solid var(--petrol-900);padding-bottom:22px;margin-bottom:8px;}
  .rhead__main{flex:1;min-width:240px;}
  .rhead .eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px;}
  .rhead h2{font-family:"Fraunces",serif;font-weight:600;font-size:30px;margin:0 0 6px;line-height:1.1;}
  .rhead__meta{font-size:14px;color:var(--muted);display:flex;flex-wrap:wrap;gap:4px 18px;}
  .rhead__meta b{color:var(--petrol-700);font-weight:600;}

  .block{margin-top:38px;}
  .block__title{display:flex;align-items:baseline;gap:12px;margin-bottom:4px;}
  .block__title h3{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:0;}
  .block__title .tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-2);}
  .block__sub{font-size:13.5px;color:var(--muted);margin:0 0 18px;}

  /* DISC */
  .disc{display:grid;grid-template-columns:1.1fr 1fr;gap:18px;}
  @media (max-width:680px){.disc{grid-template-columns:1fr;}}
  .disc__profile{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;}
  .disc__badges{display:flex;gap:10px;margin-bottom:16px;}
  .badge{flex:1;text-align:center;border-radius:12px;padding:14px 8px;color:#fff;}
  .badge .L{font-family:"Fraunces",serif;font-weight:700;font-size:30px;line-height:1;}
  .badge .n{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:5px;opacity:.92;}
  .badge.prim{box-shadow:0 6px 18px rgba(20,34,42,.18);}
  .badge.sec{opacity:.62;}
  .disc__label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px;}
  .disc__style{font-family:"Fraunces",serif;font-size:22px;font-weight:600;color:var(--ink);margin-bottom:10px;line-height:1.2;}
  .disc__desc{font-size:14px;color:var(--muted);}

  .disc__chart{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;}
  .bar{margin-bottom:15px;}
  .bar:last-child{margin-bottom:0;}
  .bar__top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .bar__name{font-size:13.5px;font-weight:600;}
  .bar__name small{font-weight:400;color:var(--muted-2);margin-left:6px;}
  .bar__val{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
  .bar__track{height:11px;border-radius:99px;background:var(--mist);overflow:hidden;}
  .bar__fill{height:100%;border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1);}

  /* gauges */
  .gauges{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;}
  @media (max-width:680px){.gauges{grid-template-columns:1fr;}}
  .gauge{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 20px;}
  .gauge__top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;}
  .gauge__name{font-size:14.5px;font-weight:600;color:var(--ink);}
  .gauge__pct{font-family:"Fraunces",serif;font-weight:700;font-size:26px;color:var(--petrol-700);font-variant-numeric:tabular-nums;}
  .gauge__track{height:9px;border-radius:99px;background:var(--mist);overflow:hidden;margin-bottom:9px;}
  .gauge__fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--petrol),var(--accent));transition:width .6s cubic-bezier(.4,0,.2,1);}
  .gauge__band{font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
  .gauge__band .dotb{width:7px;height:7px;border-radius:50%;}

  /* qualitative */
  .qual{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
  @media (max-width:680px){.qual{grid-template-columns:1fr;}}
  .qcell{background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:11px;padding:14px 16px;}
  .qcell__q{font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px;}
  .qcell__a{font-size:14.5px;color:var(--ink);font-weight:500;}

  .note{margin-top:34px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 17px;font-size:12.5px;color:var(--muted-2);display:flex;gap:10px;}
  .note b{color:var(--muted);font-weight:600;}

  /* diagnóstico + PDI */
  .resumo{margin-top:20px;background:linear-gradient(180deg,#FCFAF6,#fff);border:1px solid var(--line);border-left:4px solid var(--petrol);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 20px;}
  .resumo__tag{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--petrol);margin-bottom:6px;}
  .resumo__tx{font-size:15px;line-height:1.55;color:var(--ink);margin:0;}
  .resumo__tx b{color:var(--petrol-700);font-weight:600;}display:flex;gap:20px;align-items:center;background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 22px;margin-bottom:18px;}
  .verdito__l{text-align:center;flex:none;padding-right:20px;border-right:1px solid var(--line);}
  .verdito__lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);}
  .verdito__num{font-family:"Fraunces",serif;font-weight:700;font-size:40px;line-height:1.1;font-variant-numeric:tabular-nums;}
  .verdito__t{font-family:"Fraunces",serif;font-weight:600;font-size:19px;margin-bottom:4px;}
  .verdito__d{font-size:13.5px;color:var(--muted);}
  @media (max-width:600px){.verdito{flex-direction:column;gap:12px;text-align:center;}.verdito__l{border-right:none;border-bottom:1px solid var(--line);padding:0 0 12px;}}

  .diag__grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:22px;}
  @media (max-width:680px){.diag__grid{grid-template-columns:1fr;}}
  .diag__card{background:var(--surface);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);padding:15px 17px;}
  .diag__card:first-child{grid-column:1/-1;}
  .diag__ct{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
  .diag__ct span:first-child{font-size:14px;font-weight:700;color:var(--petrol-700);}
  .diag__pct{font-family:"Fraunces",serif;font-weight:700;font-size:18px;font-variant-numeric:tabular-nums;}
  .diag__tx{font-size:13.5px;color:var(--ink);line-height:1.5;margin:0;}
  .diag__tx b{color:var(--petrol-700);font-weight:600;}

  .pdi{background:var(--petrol-900);border-radius:var(--radius);padding:6px 22px 22px;color:#EAF1F1;box-shadow:var(--shadow-lg);}
  .pdi__head{font-family:"Fraunces",serif;font-weight:600;font-size:20px;color:#fff;padding:18px 0 14px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:16px;}
  .pdi__sec{margin-bottom:18px;}
  .pdi__sec:last-child{margin-bottom:0;}
  .pdi__st{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);margin-bottom:9px;}
  .pdi__ul{margin:0;padding-left:18px;display:grid;gap:7px;}
  .pdi__ul li{font-size:13.5px;line-height:1.5;color:#DCE7E7;}
  .pdi__ul li b{color:#fff;font-weight:600;}
  .pdi__ul.forte li{color:#CFE7DA;}
  .pdi__area{background:rgba(255,255,255,.05);border-radius:10px;padding:12px 14px;margin-bottom:9px;}
  .pdi__atop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
  .pdi__atop span:first-child{font-size:13.5px;font-weight:700;color:#fff;}
  .pdi__apct{font-size:12px;font-weight:700;font-variant-numeric:tabular-nums;}
  .pdi__none{font-size:13.5px;color:#DCE7E7;margin:0;}

  footer{margin-top:40px;border-top:1px solid var(--line);padding-top:18px;font-size:11.5px;color:var(--muted-2);text-align:center;}

  @media print{
    @page{ margin:1.2cm; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    html,body{ background:#fff !important; }
    .topbar,.note,.nav,.picker,footer{display:none !important;}
    .wrap{padding:0;max-width:100%;}
    .disc__profile,.disc__chart,.gauge,.qcell{box-shadow:none;break-inside:avoid;}
    .block{break-inside:avoid;}
    .badge,.bar__fill,.gauge__fill,.rhead,.qcell{ break-inside:avoid; }
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>

<div class="nav">
  <div class="nav__in">
    <span class="brand">WS<b>·</b>Consultoria <span>Plataforma de Avaliação</span></span>
    <nav class="tabs" id="tabs">
      <button class="tab is-on" data-view="inicio">Início</button>
      <button class="tab" data-view="individual">Individual</button>
      <button class="tab" data-view="equipe">Equipe</button>
    </nav>
    <button class="tbtn primary pdfbtn" id="print" style="display:none">Salvar PDF</button>
  </div>
</div>

<main class="wrap">

  <!-- carregamento inicial -->
  <section class="boot" id="boot">
    <div class="boot__spin"></div>
    <div class="boot__txt" id="bootTxt">Carregando avaliações da planilha…</div>
    <div class="boot__fallback" id="bootFallback" style="display:none">
      <div class="or">ou carregue os arquivos manualmente</div>
      <div class="drop" id="drop">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none"><path d="M12 15V4m0 0L8 8m4-4l4 4" stroke="#C98A3C" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 16v2a2 2 0 002 2h10a2 2 0 002-2v-2" stroke="#20505C" stroke-width="1.7" stroke-linecap="round"/></svg>
        <b>Arraste os .json dos avaliados</b><span>pode soltar vários de uma vez</span>
        <input type="file" id="file" accept="application/json,.json" multiple hidden />
      </div>
    </div>
  </section>

  <!-- INÍCIO -->

<script>
/* ====== URL do mesmo Apps Script do formulário (para puxar a planilha) ====== */
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbwXJeYwPqCwHxE0TOiTfk5rwFcc18yjfsEtmKvMO-murlKX1JRZQ_MIpFM9XkfNlvQ2/exec";

/* ============ MAPA DISC (índice da opção → dimensão) ============ */
// Parte A — 12 grupos de palavras
const DISC_A = [
  ["S","D","C","I"], ["C","I","D","S"], ["I","S","D","C"], ["C","D","I","S"],
  ["S","C","I","D"], ["I","D","C","S"], ["C","S","D","I"], ["S","I","C","D"],
  ["C","S","I","D"], ["I","D","C","S"], ["S","D","I","C"], ["C","S","D","I"],
];
// Parte B — 6 cenários
const DISC_B = [
  ["S","C","D","I"], ["C","D","I","S"], ["I","C","D","S"],
  ["C","S","D","I"], ["S","D","C","I"], ["I","C","S","D"],
];

const DIM = {
  D:{nome:"Dominância", cor:"var(--d)", desc:"orientação a resultado, decisão rápida e foco no que precisa ser feito"},
  I:{nome:"Influência", cor:"var(--i)", desc:"comunicação, entusiasmo e capacidade de engajar pessoas"},
  S:{nome:"Estabilidade", cor:"var(--s)", desc:"constância, paciência e construção de relações de confiança"},
  C:{nome:"Conformidade", cor:"var(--c)", desc:"análise, precisão e cuidado com qualidade e processos"},
};

const ESTILO = {
  D:{titulo:"Executor — orientado a resultado",
     texto:"Age com rapidez e assertividade, prefere ir direto ao ponto e assume o controle diante de desafios. Brilha em metas agressivas e decisões sob pressão. Ponto de atenção: equilibrar firmeza com escuta e paciência com processos."},
  I:{titulo:"Comunicador — orientado a pessoas",
     texto:"Conecta-se com facilidade, transmite entusiasmo e influencia pelo relacionamento. Forte em prospecção, rapport e situações que exigem energia e persuasão. Ponto de atenção: disciplina de acompanhamento e atenção aos detalhes."},
  S:{titulo:"Estável — orientado a relação",
     texto:"Constrói confiança pela constância, é paciente e colaborativo, mantém a calma em ambientes tensos. Forte em pós-venda, fidelização e trabalho em equipe. Ponto de atenção: lidar com mudanças bruscas e assumir posições mais incisivas."},
  C:{titulo:"Analítico — orientado a qualidade",
     texto:"Decide com base em dados, preza pela precisão e estrutura tudo antes de agir. Forte em argumentação técnica e diagnóstico. Ponto de atenção: velocidade de decisão e flexibilidade quando faltam informações completas."},
};

/* ============ ÍNDICES LIKERT (competências) ============ */
const COMPET = [
  {key:"s1", n:21, nome:"Alinhamento Cultural", desc:"aderência aos valores e à missão da My Blue"},
  {key:"s3", n:12, nome:"Inteligência Emocional", desc:"autoconsciência, autocontrole e empatia"},
  {key:"s4", n:12, nome:"Competências Comerciais", desc:"prospecção, negociação e relacionamento"},
  {key:"s5", n:8,  nome:"Potencial de Liderança", desc:"influência, visão e desenvolvimento de pessoas"},
];

/* ============ QUALITATIVAS ============ */
const QUAL = [
  {key:"s6_mc1", q:"O que mais te motiva no trabalho", opts:{A:"Atingir e superar metas",B:"Reconhecimento da liderança e colegas",C:"Crescer na carreira e assumir responsabilidades",D:"Fazer parte de uma missão / propósito",E:"Autonomia e liberdade para decidir",F:"Ganhar bem e ter estabilidade financeira"}},
  {key:"s6_mc2", q:"Área que mais quer desenvolver (12 meses)", opts:{A:"Técnicas de vendas e negociação",B:"Gestão emocional e comunicação",C:"Liderança e desenvolvimento de equipes",D:"Conhecimento técnico do produto",E:"Gestão de tempo e produtividade",F:"Estratégia comercial e inteligência de mercado"}},
  {key:"s4_mc1", q:"Maior ponto forte em vendas", opts:{A:"Prospecção",B:"Abordagem e rapport",C:"Diagnóstico de necessidades",D:"Apresentação de valor",E:"Negociação e objeções",F:"Fechamento",G:"Pós-venda e carteira"}},
  {key:"s4_mc2", q:"Reação ao não bater a meta", opts:{A:"Analisar o funil",B:"Aumentar prospecção",C:"Pedir orientação",D:"Revisar abordagem",E:"Intensificar acompanhamento"}},
  {key:"s5_mc1", q:"Maior desafio se virasse líder hoje", opts:{A:"Autoridade sem perder proximidade",B:"Cobrar sem parecer injusto",C:"Delegar e confiar",D:"Decisões que impactam pessoas",E:"Equilibrar entrega individual e time"}},
  {key:"s3_mc1", q:"Reação a um colega que irrita/decepciona", opts:{A:"Conversar diretamente",B:"Afastar para processar antes",C:"Desabafar com alguém de confiança",D:"Ignorar e focar no trabalho",E:"Comunicar à liderança se recorrente"}},
];

/* ====================== LÓGICA ====================== */
function computar(d){
  const r = d.respostas || {};
  // DISC
  const mais = {D:0,I:0,S:0,C:0}, menos = {D:0,I:0,S:0,C:0};
  DISC_A.forEach((map,gi)=>{
    const m = r[`s2a_g${gi+1}_mais`], n = r[`s2a_g${gi+1}_menos`];
    if(m!=null&&m!=="") mais[map[+m]]++;
    if(n!=null&&n!=="") menos[map[+n]]++;
  });
  DISC_B.forEach((map,ci)=>{
    const m = r[`s2b_c${ci+1}_mais`], n = r[`s2b_c${ci+1}_menos`];
    if(m!=null&&m!=="") mais[map[+m]]++;
    if(n!=null&&n!=="") menos[map[+n]]++;
  });
  const net = {}; ["D","I","S","C"].forEach(k=> net[k]=mais[k]-menos[k]);
  const ranked = ["D","I","S","C"].sort((a,b)=> net[b]-net[a] || mais[b]-mais[a]);

  // Competências
  const comp = COMPET.map(c=>{
    let sum=0, cnt=0;
    for(let i=1;i<=c.n;i++){ const v=r[`${c.key}_q${i}`]; if(v){ sum+=+v; cnt++; } }
    const pct = cnt? Math.round(((sum/cnt - 1)/3)*100) : 0; // escala 1-4 → 0-100%
    return {...c, pct, band:banda(pct)};
  });
  const compBy = {}; comp.forEach(x=> compBy[x.key]=x);

  // Distribuição DISC em % (sobre as escolhas "MAIS")
  const totMais = mais.D+mais.I+mais.S+mais.C || 1;
  const discPct = {}; ["D","I","S","C"].forEach(k=> discPct[k]=Math.round((mais[k]/totMais)*100));

  // Clusters de cultura (cada um = 3 afirmações da Seção 1)
  const clusters = CLUSTERS.map(cl=>{
    let sum=0,cnt=0;
    cl.qs.forEach(i=>{ const v=r[`s1_q${i}`]; if(v){ sum+=+v; cnt++; } });
    const pct = cnt? Math.round(((sum/cnt - 1)/3)*100) : 0;
    return {nome:cl.nome, acao:cl.acao, pct, band:banda(pct)};
  });

  return {mais,menos,net,ranked,comp,compBy,discPct,clusters};
}

/* Clusters de valores da Seção 1 (3 afirmações cada) + ação de melhoria */
const CLUSTERS = [
  {nome:"Simplicidade e Agilidade", qs:[1,2,3], acao:"buscar soluções mais diretas e eliminar etapas que não agregam valor antes de executar"},
  {nome:"Integridade e Credibilidade", qs:[4,5,6], acao:"reforçar a coerência entre o que promete e entrega, e a transparência ao lidar com problemas"},
  {nome:"Foco no Cliente", qs:[7,8,9], acao:"conectar as decisões do dia a dia ao impacto na experiência do cliente final"},
  {nome:"Pessoas e Clima", qs:[10,11,12], acao:"reconhecer e valorizar colegas de forma ativa, contribuindo para um clima saudável"},
  {nome:"Eficiência de Recursos", qs:[13,14,15], acao:"avaliar alternativas eficientes antes de solicitar recursos e usar o que há com critério"},
  {nome:"Dono do Resultado", qs:[16,17,18], acao:"assumir responsabilidade ativa pelo resultado, com disciplina mesmo fora da zona de conforto"},
  {nome:"Inovação e Adaptação", qs:[19,20,21], acao:"questionar o status quo, propor melhorias e encarar mudanças como oportunidade"},
];
function banda(p){
  if(p>=85) return {label:"Excepcional", cor:"#2F7D5B"};
  if(p>=70) return {label:"Forte", cor:"#2E6E8E"};
  if(p>=55) return {label:"Consistente", cor:"#C98A3C"};
  return {label:"Em desenvolvimento", cor:"#C0492F"};
}

/* ============ DIAGNÓSTICO + PLANO DE DESENVOLVIMENTO ============ */
const ACOES = {
  s3:["Praticar a identificação das próprias emoções no momento em que surgem, nomeando o que sente.",
      "Treinar a pausa antes de reagir em situações de frustração ou conflito.",
      "Desenvolver escuta ativa e leitura dos sinais emocionais dos colegas.",
      "Separar a crítica ao trabalho da crítica pessoal ao receber feedback."],
  s4:["Estruturar uma rotina consistente de prospecção e de follow-up das negociações.",
      "Treinar o diagnóstico de necessidades e o manejo de objeções sem se sentir atacado.",
      "Praticar a apresentação de valor sem recorrer ao desconto como primeiro recurso.",
      "Disciplinar o registro e o acompanhamento ativo de cada oportunidade."],
  s5:["Assumir pequenas frentes de coordenação para exercitar influência sem depender do cargo.",
      "Praticar feedbacks construtivos, específicos e no momento certo.",
      "Desenvolver visão de conjunto, enxergando além das tarefas imediatas.",
      "Exercitar a delegação e o desenvolvimento das pessoas ao redor."],
};
const DISC_ACAO = {
  D:"Equilibrar a assertividade com escuta ativa e paciência; envolver o time antes de decidir e cuidar do impacto do estilo direto nas relações.",
  I:"Reforçar disciplina de acompanhamento, organização e atenção aos detalhes — pontos que a empolgação pode deixar passar.",
  S:"Desenvolver tolerância a mudanças rápidas e disposição para assumir posições mais incisivas quando a situação exigir.",
  C:"Acelerar a tomada de decisão mesmo sem informação completa e ganhar flexibilidade diante de imprevistos.",
};
const DISC_NOME = {D:"Dominância",I:"Influência",S:"Estabilidade",C:"Conformidade"};
const FORCA_ACAO = {
  s1:"tornar-se referência e multiplicador dos valores da empresa, ajudando a disseminar a cultura no time.",
  s3:"atuar como ponto de equilíbrio em momentos de tensão e apoiar colegas na gestão emocional.",
  s4:"assumir contas estratégicas e mentorar novos vendedores, transformando a força comercial em resultado coletivo.",
  s5:"assumir frentes de coordenação e projetos que exijam influência e visão de conjunto.",
};

function fitVerdito(p){
  if(p>=75) return {t:"Alta aderência", d:"Perfil alinhado à cultura e ao comportamento esperado. Recomendação: investir no desenvolvimento e na retenção, posicionando a pessoa onde seus pontos fortes rendem mais.", cor:"#2F7D5B"};
  if(p>=60) return {t:"Aderência sólida", d:"Bom encaixe geral, com pontos específicos a desenvolver. Recomendação: seguir com plano de desenvolvimento direcionado.", cor:"#2E6E8E"};
  if(p>=45) return {t:"Aderência moderada", d:"Encaixe parcial. Recomendação: desenvolvimento estruturado com acompanhamento próximo e metas claras de evolução em prazo definido.", cor:"#C98A3C"};
  return {t:"Aderência a aprofundar", d:"Os indicadores sugerem distância entre o perfil atual e o esperado. Recomendação: conversa de devolutiva aprofundada para avaliar fit, expectativas e plano intensivo antes de qualquer encaminhamento.", cor:"#C0492F"};
}

function diagnosticoHTML(c, nome){
  const prim = c.ranked[0], sec = c.ranked[1];
  const primeiro = (nome||"O avaliado").split(" ")[0];
  const cultura = c.compBy.s1, eq = c.compBy.s3, com = c.compBy.s4, lid = c.compBy.s5;
  const aderencia = Math.round((cultura.pct*0.6) + (eq.pct*0.4)); // cultura pesa mais
  const v = fitVerdito(aderencia);

  // clusters culturais ordenados
  const clOrd = [...c.clusters].sort((a,b)=>b.pct-a.pct);
  const fortesC = clOrd.filter(x=>x.pct>=70).slice(0,2);                       // claramente fortes
  const fracosNarr = [...c.clusters].sort((a,b)=>a.pct-b.pct).filter(x=>x.pct<60).slice(0,3); // claramente fracos
  const fracosPDI = [...c.clusters].sort((a,b)=>a.pct-b.pct).slice(0,2);       // sempre os 2 menores p/ ação

  // prioridades de desenvolvimento (competências mais baixas)
  const areas = [{...cultura,k:"s1"},{...eq,k:"s3"},{...com,k:"s4"},{...lid,k:"s5"}];
  const prioridades = areas.filter(a=>a.pct<70).sort((a,b)=>a.pct-b.pct);
  const fortes = areas.filter(a=>a.pct>=70).sort((a,b)=>b.pct-a.pct);

  // texto do diagnóstico DISC
  const discDist = ["D","I","S","C"].map(k=>`${k} ${c.discPct[k]}%`).join(" · ");

  let h = `<div class="block diag">
    <div class="block__title"><h3>Diagnóstico &amp; Plano de Desenvolvimento</h3><span class="tag">síntese consultiva</span></div>
    <p class="block__sub">Leitura integrada do perfil de ${esc(primeiro)}, com indicação de aderência e ações práticas de evolução.</p>`;

  // Aderência
  h += `<div class="verdito" style="border-color:${v.cor}">
    <div class="verdito__l">
      <div class="verdito__lbl">Índice de aderência</div>
      <div class="verdito__num" style="color:${v.cor}">${aderencia}%</div>
    </div>
    <div class="verdito__r">
      <div class="verdito__t" style="color:${v.cor}">${v.t}</div>
      <div class="verdito__d">${v.d}</div>
    </div>
  </div>`;

  // Diagnóstico narrativo
  h += `<div class="diag__grid">`;

  // Cultura
  let cultTxt = `O alinhamento à cultura está em <b>${cultura.pct}%</b> (${cultura.band.label.toLowerCase()}). Como as afirmações desta seção foram construídas sobre os próprios valores da My Blue, esse índice reflete o quanto ${esc(primeiro)} pensa e age em sintonia com a empresa.`;
  if(fortesC.length) cultTxt += ` Destaque positivo em <b>${fortesC.map(x=>x.nome).join("</b> e <b>")}</b>.`;
  if(fracosNarr.length) cultTxt += ` Os pontos com mais espaço de evolução são <b>${fracosNarr.map(x=>x.nome).join("</b>, <b>")}</b>.`;
  h += diagCard("Cultura e Valores", cultura, cultTxt);

  // DISC
  let discTxt = `O perfil predominante é <b>${prim} — ${DISC_NOME[prim]}</b>, com <b>${sec} — ${DISC_NOME[sec]}</b> como traço secundário. Distribuição das escolhas: <b>${discDist}</b>. ${esc(ESTILO[prim].texto)}`;
  h += diagCard("Perfil DISC", null, discTxt);

  // EQ
  h += diagCard("Inteligência Emocional", eq, `A inteligência emocional está em <b>${eq.pct}%</b> (${eq.band.label.toLowerCase()}) — capacidade de perceber, regular e usar as emoções a favor das relações e do resultado.`);
  // Comercial
  h += diagCard("Competências Comerciais", com, `As competências comerciais estão em <b>${com.pct}%</b> (${com.band.label.toLowerCase()}) — prospecção, negociação, manejo de objeções e relacionamento com a carteira.`);
  // Liderança
  h += diagCard("Potencial de Liderança", lid, `O potencial de liderança está em <b>${lid.pct}%</b> (${lid.band.label.toLowerCase()}) — influência, visão de conjunto e disposição para desenvolver pessoas, independente do cargo atual.`);

  h += `</div>`; // fim diag__grid

  // PDI
  h += `<div class="pdi">
    <div class="pdi__head">Plano de Desenvolvimento Individual</div>`;

  if(fortes.length){
    h += `<div class="pdi__sec"><div class="pdi__st">Forças a potencializar</div><ul class="pdi__ul forte">`;
    fortes.forEach(a=> h += `<li><b>${esc(a.nome)} (${a.pct}%)</b> — ${esc(FORCA_ACAO[a.k]||"alavancar esse ponto forte em desafios à altura.")}</li>`);
    h += `</ul></div>`;
  }

  h += `<div class="pdi__sec"><div class="pdi__st">Prioridades de desenvolvimento</div>`;
  if(!prioridades.length){
    h += `<p class="pdi__none">Todos os eixos estão em nível sólido. Foco em manter consistência e assumir desafios de maior complexidade.</p>`;
  } else {
    prioridades.forEach(a=>{
      let acoes = [];
      if(a.k==="s1"){ acoes = fracosPDI.map(x=>`Em <b>${esc(x.nome)}</b>: ${x.acao}.`); if(!acoes.length) acoes=["Reforçar a vivência prática dos valores no dia a dia."]; }
      else acoes = (ACOES[a.k]||[]).slice(0,3).map(t=>esc(t));
      h += `<div class="pdi__area">
        <div class="pdi__atop"><span>${esc(a.nome)}</span><span class="pdi__apct" style="color:${a.band.cor}">${a.pct}% · ${a.band.label}</span></div>
        <ul class="pdi__ul">${acoes.map(t=>`<li>${t}</li>`).join("")}</ul>
      </div>`;
    });
  }
  h += `</div>`;

  // DISC balance
  h += `<div class="pdi__sec"><div class="pdi__st">Equilíbrio do estilo (${prim} — ${DISC_NOME[prim]})</div>
    <ul class="pdi__ul"><li>${esc(DISC_ACAO[prim])}</li></ul></div>`;

  h += `</div>`; // fim pdi
  h += `</div>`; // fim block
  return h;
}

function diagCard(titulo, comp, texto){
  const tag = comp ? `<span class="diag__pct" style="color:${comp.band.cor}">${comp.pct}%</span>` : "";
  return `<div class="diag__card">
    <div class="diag__ct"><span>${esc(titulo)}</span>${tag}</div>
    <p class="diag__tx">${texto}</p>
  </div>`;
}

/* ====================== RENDER INDIVIDUAL ====================== */
function renderIndividual(d){
  const c = computar(d);
  const id = (k)=> (d.respostas&&d.respostas[k]) || "";
  const nome = d.avaliado || id("nome") || "Avaliado";
  const leg = d.legivel || {};
  const cargo = leg["Cargo / Função"] || "";
  const cidade = leg["Cidade / Unidade de atuação"] || "";
  const tempo = leg["Tempo de empresa"] || "";
  const data = leg["Data de aplicação"] || "";

  const prim = c.ranked[0], sec = c.ranked[1];
  const maxAbs = Math.max(6, ...["D","I","S","C"].map(k=>Math.abs(c.net[k])));

  let h = `
  <div class="rhead">
    <div class="rhead__main">
      <div class="eyebrow">Perfil Comportamental · My Blue</div>
      <h2>${esc(nome)}</h2>
      <div class="rhead__meta">
        ${cargo?`<span><b>Cargo:</b> ${esc(cargo)}</span>`:""}
        ${cidade?`<span><b>Unidade:</b> ${esc(cidade)}</span>`:""}
        ${tempo?`<span><b>Empresa:</b> ${esc(tempo)}</span>`:""}
        ${data?`<span><b>Aplicação:</b> ${esc(fmtData(data))}</span>`:""}
      </div>
    </div>
  </div>`;

  // Resumo executivo (síntese no topo)
  h += resumoExecutivoHTML(c, nome, leg);

  // DISC
  h += `<div class="block">
    <div class="block__title"><h3>Perfil DISC</h3><span class="tag">18 itens de escolha forçada</span></div>
    <p class="block__sub">Estilo comportamental natural, calculado pelo padrão MAIS − MENOS em cada dimensão.</p>
    <div class="disc">
      <div class="disc__profile">
        <div class="disc__badges">
          ${[prim,sec].map((k,i)=>`<div class="badge ${i===0?"prim":"sec"}" style="background:${DIM[k].cor}">
            <div class="L">${k}</div><div class="n">${DIM[k].nome}</div></div>`).join("")}
        </div>
        <div class="disc__label">Estilo dominante</div>
        <div class="disc__style">${esc(ESTILO[prim].titulo)}</div>
        <p class="disc__desc">${esc(ESTILO[prim].texto)}</p>
      </div>
      <div class="disc__chart">
        ${c.ranked.map(k=>{
          const v=c.net[k]; const w=Math.round((Math.abs(v)/maxAbs)*100);
          return `<div class="bar">
            <div class="bar__top"><span class="bar__name">${k} <small>${DIM[k].nome}</small></span>
              <span class="bar__val" style="color:${DIM[k].cor}">${v>0?"+":""}${v}</span></div>
            <div class="bar__track"><div class="bar__fill" style="width:${w}%;background:${DIM[k].cor}"></div></div>
          </div>`;
        }).join("")}
      </div>
    </div>
  </div>`;

  // Competências
  h += `<div class="block">
    <div class="block__title"><h3>Índices de Competência</h3><span class="tag">escala 1–4 normalizada</span></div>
    <p class="block__sub">Médias das afirmações de cada eixo, convertidas em percentual de aderência.</p>
    <div class="gauges">
      ${c.comp.map(g=>`<div class="gauge">
        <div class="gauge__top"><span class="gauge__name">${esc(g.nome)}</span><span class="gauge__pct">${g.pct}%</span></div>
        <div class="gauge__track"><div class="gauge__fill" style="width:${g.pct}%"></div></div>
        <span class="gauge__band" style="color:${g.band.cor}"><span class="dotb" style="background:${g.band.cor}"></span>${g.band.label}</span>
      </div>`).join("")}
    </div>
  </div>`;

  // Qualitativas
  h += `<div class="block">
    <div class="block__title"><h3>Leitura Qualitativa</h3><span class="tag">drivers e percepções</span></div>
    <p class="block__sub">Respostas de múltipla escolha que ajudam a direcionar o plano de desenvolvimento.</p>
    <div class="qual">
      ${QUAL.map(q=>{
        const v = id(q.key); const a = q.opts[v] || "—";
        return `<div class="qcell"><div class="qcell__q">${esc(q.q)}</div><div class="qcell__a">${esc(a)}</div></div>`;
      }).join("")}
    </div>
  </div>`;

  // Diagnóstico completo + Plano de Desenvolvimento Individual
  h += diagnosticoHTML(c, nome);

  h += `<div class="note">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex:none"><circle cx="12" cy="12" r="9" stroke="#7E8E93" stroke-width="1.5"/><path d="M12 11v5M12 8v.5" stroke="#7E8E93" stroke-width="1.6" stroke-linecap="round"/></svg>
    <span><b>Como ler.</b> Este diagnóstico parte da autopercepção do avaliado e serve como apoio à decisão — não como veredito. Ele deve ser validado e aprofundado em uma conversa de devolutiva antes de qualquer encaminhamento sobre a pessoa.</span>
  </div>`;

  document.getElementById("ind-report").innerHTML = h;
  document.getElementById("print").style.display = "inline-flex";
}

const esc = s => String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]));

function fmtData(s){
  if(!s) return "";
  const m = String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  return m ? `${m[3]}/${m[2]}/${m[1]}` : String(s);
}

function resumoExecutivoHTML(c, nome, leg){
  const prim = c.ranked[0], sec = c.ranked[1];
  const primeiro = (nome||"O avaliado").split(" ")[0];
  const areas = [{n:"alinhamento cultural",p:c.compBy.s1.pct},{n:"inteligência emocional",p:c.compBy.s3.pct},{n:"competências comerciais",p:c.compBy.s4.pct},{n:"potencial de liderança",p:c.compBy.s5.pct}];
  const forte = [...areas].sort((a,b)=>b.p-a.p)[0];
  const fraco = [...areas].sort((a,b)=>a.p-b.p)[0];
  const ader = Math.round(c.compBy.s1.pct*0.6 + c.compBy.s3.pct*0.4);
  const v = fitVerdito(ader);
  const tempo = leg["Tempo de empresa"] ? ` Com ${esc(leg["Tempo de empresa"])} de casa,` : "";
  const txt = `<b>${esc(primeiro)}</b> tem perfil comportamental predominante <b>${prim} — ${DISC_NOME[prim]}</b>, com traço secundário <b>${sec} — ${DISC_NOME[sec]}</b>.${tempo} se destaca em <b>${forte.n} (${forte.p}%)</b> e tem em <b>${fraco.n} (${fraco.p}%)</b> sua principal frente de desenvolvimento. O índice de aderência é de <b style="color:${v.cor}">${ader}% — ${v.t.toLowerCase()}</b>.`;
  return `<div class="resumo">
    <div class="resumo__tag">Síntese</div>
    <p class="resumo__tx">${txt}</p>
  </div>`;
}

/* ====================== EQUIPE + DASHBOARD ====================== */
const MOTIV={A:"Atingir e superar metas",B:"Reconhecimento",C:"Crescer na carreira",D:"Missão / propósito",E:"Autonomia",F:"Estabilidade financeira"};

function metricasPessoa(d){
  const c = computar(d);
  return {dom:c.ranked[0], sec:c.ranked[1],
    s1:c.compBy.s1.pct, s3:c.compBy.s3.pct, s4:c.compBy.s4.pct, s5:c.compBy.s5.pct,
    ader:Math.round(c.compBy.s1.pct*0.6 + c.compBy.s3.pct*0.4),
    mot:(d.respostas&&d.respostas.s6_mc1)||""};
}
function aggregarTime(){
  const list = PESSOAS.filter(p=>p.dados&&p.dados.respostas)
    .map(p=>({nome:p.avaliado||"—", ...metricasPessoa(p.dados)}));
  const N = list.length || 1;
  const discCount={D:0,I:0,S:0,C:0}; list.forEach(p=>discCount[p.dom]++);
  const keys=["s1","s3","s4","s5"];
  const nomes={s1:"Alinhamento Cultural",s3:"Inteligência Emocional",s4:"Competências Comerciais",s5:"Potencial de Liderança"};
  const avg={}; keys.forEach(k=> avg[k]=Math.round(list.reduce((a,p)=>a+p[k],0)/N));
  const top={}; keys.forEach(k=> top[k]=list.reduce((b,p)=> p[k]>b[k]?p:b, list[0]||{nome:"—",[k]:0}));
  const aderAvg=Math.round(list.reduce((a,p)=>a+p.ader,0)/N);
  const gapKey=keys.slice().sort((a,b)=>avg[a]-avg[b])[0];
  const forteKey=keys.slice().sort((a,b)=>avg[b]-avg[a])[0];
  const domTeam=["D","I","S","C"].sort((a,b)=>discCount[b]-discCount[a])[0];
  const motCount={}; Object.keys(MOTIV).forEach(k=>motCount[k]=0); list.forEach(p=>{if(p.mot&&motCount[p.mot]!=null)motCount[p.mot]++;});
  return {list,N:list.length,discCount,avg,top,aderAvg,gapKey,forteKey,domTeam,motCount,nomes,keys};
}

function renderDashboard(){
  if(!PESSOAS.length){ document.getElementById("view-inicio").innerHTML = vazio(); return; }
  const A = aggregarTime();
  const leituraTime={D:"orientado a resultado e ação",I:"comunicativo e engajador",S:"relacional e estável",C:"analítico e criterioso"}[A.domTeam];
  let h = `<div class="dash__hero">
    <span class="eyebrow">My Blue · WS Consultoria</span>
    <h1>Plataforma de <em>Avaliação Comportamental</em></h1>
    <p>Visão consolidada de ${A.N} ${A.N===1?"avaliado":"avaliados"} — perfil do time, forças e prioridades de desenvolvimento.</p>
  </div>`;

  h += `<div class="stats">
    <div class="stat"><div class="stat__lbl">Avaliados</div><div class="stat__val">${A.N}</div></div>
    <div class="stat"><div class="stat__lbl">Perfil do time</div><div class="stat__val">${A.domTeam} <small>${DIM[A.domTeam].nome} · ${leituraTime}</small></div></div>
    <div class="stat"><div class="stat__lbl">Aderência média</div><div class="stat__val">${A.aderAvg}%</div></div>
  </div>`;

  h += `<div class="block"><div class="block__title"><h3>Mapa DISC do time</h3></div><div class="discteam">`;
  ["D","I","S","C"].forEach(k=> h += `<div class="dt"><div class="dt__L" style="background:${DIM[k].cor}">${k}</div><div class="dt__n">${DIM[k].nome}</div><div class="dt__count">${A.discCount[k]}<small>/${A.N}</small></div></div>`);
  h += `</div></div>`;

  h += `<div class="block"><div class="block__title"><h3>Competências — média do time</h3></div><div class="gauges">`;
  A.keys.forEach(k=>{const p=A.avg[k],b=banda(p);
    h += `<div class="gauge"><div class="gauge__top"><span class="gauge__name">${esc(A.nomes[k])}</span><span class="gauge__pct">${p}%</span></div><div class="gauge__track"><div class="gauge__fill" style="width:${p}%"></div></div><span class="gauge__band" style="color:${b.cor}"><span class="dotb" style="background:${b.cor}"></span>${b.label}</span></div>`;});
  h += `</div></div>`;

  h += `<div class="cta">
    <button class="ctabtn" data-go="individual">Ver relatório individual <span class="arr">→</span></button>
    <button class="ctabtn alt" data-go="equipe">Ver diagnóstico de equipe <span class="arr">→</span></button>
  </div>`;

  document.getElementById("view-inicio").innerHTML = h;
  document.querySelectorAll("[data-go]").forEach(b=> b.addEventListener("click",()=>trocarAba(b.dataset.go)));
}

function renderEquipe(){
  if(!PESSOAS.length){ document.getElementById("eq-report").innerHTML = vazio(); return; }
  const A = aggregarTime();
  const motMax=Math.max(1,...Object.values(A.motCount));
  let h = `<div class="rhead" style="border-bottom:2px solid var(--petrol-900);padding-bottom:18px;margin:26px 0 8px"><div class="eyebrow" style="font-size:11.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:8px">Diagnóstico de Equipe · My Blue</div><h2 style="font-family:'Fraunces',serif;font-weight:600;font-size:28px;margin:0">Visão do Time</h2><div style="font-size:14px;color:var(--muted);margin-top:4px">${A.N} ${A.N===1?"avaliado":"avaliados"} · ${new Date().toLocaleDateString("pt-BR")}</div></div>`;

  const leituraTime={D:"orientado a resultado e ação rápida — entrega forte, mas precisa cuidar de relacionamento e processos",I:"comunicativo e energético — bom em engajar e prospectar, com atenção a disciplina e detalhes",S:"relacional e estável — excelente em confiança e fidelização, com atenção a velocidade e a posições mais incisivas",C:"analítico e criterioso — forte em qualidade e estrutura, com atenção a agilidade de decisão"}[A.domTeam];
  h += `<div class="resumo"><div class="resumo__tag">Síntese do time</div><p class="resumo__tx">O time tem tendência predominante <b>${A.domTeam} — ${DIM[A.domTeam].nome}</b>: ${leituraTime}. A aderência média é de <b>${A.aderAvg}%</b>, com força coletiva em <b>${esc(A.nomes[A.forteKey])}</b> e maior oportunidade de desenvolvimento em <b>${esc(A.nomes[A.gapKey])}</b>.</p></div>`;

  h += `<div class="block"><div class="block__title"><h3>Mapa DISC do Time</h3><span class="tag">perfil dominante de cada pessoa</span></div><div class="discteam">`;
  ["D","I","S","C"].forEach(k=> h += `<div class="dt"><div class="dt__L" style="background:${DIM[k].cor}">${k}</div><div class="dt__n">${DIM[k].nome}</div><div class="dt__count">${A.discCount[k]}<small>/${A.N}</small></div></div>`);
  h += `</div></div>`;

  h += `<div class="block"><div class="block__title"><h3>Competências — média do time</h3><span class="tag">escala 1–4 normalizada</span></div><div class="gauges">`;
  A.keys.forEach(k=>{const p=A.avg[k],b=banda(p);
    h += `<div class="gauge"><div class="gauge__top"><span class="gauge__name">${esc(A.nomes[k])}</span><span class="gauge__pct">${p}%</span></div><div class="gauge__track"><div class="gauge__fill" style="width:${p}%"></div></div><span class="gauge__band" style="color:${b.cor}"><span class="dotb" style="background:${b.cor}"></span>${b.label}</span></div>`;});
  h += `</div></div>`;

  h += `<div class="block"><div class="block__title"><h3>Destaques e Prioridade</h3><span class="tag">quem puxa, onde investir</span></div><div class="cards2">`;
  h += `<div class="panelc"><h4>Referências por competência</h4>`;
  A.keys.forEach(k=> h += `<div class="hl"><b>${esc(A.nomes[k])}</b><span class="v">${esc(A.top[k].nome.split(" ")[0])} · ${A.top[k][k]}%</span></div>`);
  h += `</div>`;
  h += `<div class="gap"><h4>Maior oportunidade do time</h4><p><b>${esc(A.nomes[A.gapKey])}</b> é o eixo com menor média coletiva (<b>${A.avg[A.gapKey]}%</b>). Recomendação: priorizar um treinamento ou trilha de desenvolvimento neste tema — é o ponto de maior retorno para o grupo.</p></div>`;
  h += `</div></div>`;

  h += `<div class="block"><div class="block__title"><h3>O que move a equipe</h3><span class="tag">motivadores</span></div><div class="mot">`;
  Object.keys(MOTIV).sort((a,b)=>A.motCount[b]-A.motCount[a]).forEach(k=>{ if(!A.motCount[k]) return;
    const w=Math.round((A.motCount[k]/motMax)*100);
    h += `<div class="motrow"><span>${esc(MOTIV[k])}</span><span class="bart"><span class="bar" style="width:${w}%"></span></span><span class="num">${A.motCount[k]}</span></div>`;});
  h += `</div></div>`;

  const rost=[...A.list].sort((a,b)=>b.ader-a.ader);
  h += `<div class="block"><div class="block__title"><h3>Quadro Individual</h3><span class="tag">${A.N} pessoas</span></div><div style="overflow-x:auto"><table class="roster"><thead><tr><th>Avaliado</th><th>DISC</th><th>Cultura</th><th>Intel. Emoc.</th><th>Comercial</th><th>Liderança</th><th>Aderência</th></tr></thead><tbody>`;
  rost.forEach(p=> h += `<tr><td class="nm">${esc(p.nome)}</td><td><span class="pill" style="background:${DIM[p.dom].cor}">${p.dom}</span> <span style="color:var(--muted-2)">/ ${p.sec}</span></td><td class="num">${p.s1}%</td><td class="num">${p.s3}%</td><td class="num">${p.s4}%</td><td class="num">${p.s5}%</td><td class="num" style="font-weight:700;color:${banda(p.ader).cor}">${p.ader}%</td></tr>`);
  h += `</tbody></table></div></div>`;

  h += `<div class="note"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex:none"><circle cx="12" cy="12" r="9" stroke="#7E8E93" stroke-width="1.5"/><path d="M12 11v5M12 8v.5" stroke="#7E8E93" stroke-width="1.6" stroke-linecap="round"/></svg><span><b>Como ler.</b> As médias refletem a autopercepção do time e orientam decisões coletivas de desenvolvimento — não substituem a leitura individual.</span></div>`;

  document.getElementById("eq-report").innerHTML = h;
}

function vazio(){
  return `<div class="boot" style="padding:70px 0"><div class="boot__txt">Nenhuma avaliação na planilha ainda. Assim que alguém enviar o formulário, os dados aparecem aqui.</div></div>`;
}

/* ====================== ABAS ====================== */
function trocarAba(view){
  document.querySelectorAll(".tab").forEach(t=> t.classList.toggle("is-on", t.dataset.view===view));
  ["inicio","individual","equipe"].forEach(v=> document.getElementById("view-"+v).style.display = (v===view?"block":"none"));
  // PDF só faz sentido em individual/equipe
  const showPdf = (view==="individual" && document.getElementById("ind-report").innerHTML) || (view==="equipe" && PESSOAS.length);
  document.getElementById("print").style.display = showPdf ? "inline-flex" : "none";
  window.scrollTo({top:0,behavior:"smooth"});
}
document.querySelectorAll(".tab").forEach(t=> t.addEventListener("click",()=>trocarAba(t.dataset.view)));
document.getElementById("print").addEventListener("click",()=>window.print());

/* ====================== CARREGAR DADOS ====================== */
let PESSOAS = [];
const pickSelect = document.getElementById("pickSelect");
const bootTxt = document.getElementById("bootTxt");

function popularTudo(){
  pickSelect.innerHTML = PESSOAS.map((p,i)=>{
    const dt = p.data ? ` · ${esc(p.data)}` : "";
    return `<option value="${i}">${esc(p.avaliado)}${dt}</option>`;
  }).join("");
  renderDashboard();
  renderEquipe();
  if(PESSOAS.length){ selecionarIndividual(0); }
  document.getElementById("boot").style.display = "none";
  document.getElementById("view-inicio").style.display = "block";
}
function selecionarIndividual(i){
  const p = PESSOAS[i];
  if(p && p.dados){ try{ renderIndividual(p.dados); }catch(e){ document.getElementById("ind-report").innerHTML = `<p style="padding:30px;color:var(--d)">Erro ao montar a leitura: ${esc(e.message)}</p>`; } }
}
pickSelect.addEventListener("change",()=>selecionarIndividual(+pickSelect.value));
document.getElementById("pickRefresh").addEventListener("click",carregar);

async function carregar(){
  bootTxt.classList.remove("err");
  bootTxt.textContent = "Carregando avaliações da planilha…";
  document.getElementById("boot").style.display = "block";
  ["inicio","individual","equipe"].forEach(v=> document.getElementById("view-"+v).style.display="none");
  if(!ENDPOINT_URL){ mostrarFallback("Configure o endpoint ou carregue os arquivos."); return; }
  try{
    const res = await fetch(ENDPOINT_URL + "?action=list", {method:"GET"});
    const data = await res.json();
    PESSOAS = (data && data.pessoas) ? data.pessoas.filter(p=>p.dados&&p.dados.respostas) : [];
    popularTudo();
  }catch(err){
    mostrarFallback("Não consegui acessar a planilha — carregue os arquivos abaixo, ou confira a publicação do Apps Script.");
  }
}
function mostrarFallback(msg){
  bootTxt.classList.add("err"); bootTxt.textContent = msg;
  document.getElementById("bootFallback").style.display = "block";
}

/* upload múltiplo (fallback) */
const drop = document.getElementById("drop"), file = document.getElementById("file");
drop.addEventListener("click",()=>file.click());
["dragover","dragenter"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over");}));
["dragleave","drop"].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove("over");}));
drop.addEventListener("drop",e=>{e.preventDefault();lerArquivos(e.dataTransfer.files);});
file.addEventListener("change",e=>lerArquivos(e.target.files));
function lerArquivos(files){
  const arr=[...files]; let pend=arr.length; const acc=[];
  if(!pend) return;
  arr.forEach(f=>{const rd=new FileReader();rd.onload=()=>{try{const d=JSON.parse(rd.result);if(d.respostas)acc.push({avaliado:d.avaliado||"—",dados:d});}catch(_){}if(--pend===0){ if(acc.length){ PESSOAS=acc; popularTudo(); } else { bootTxt.textContent="Não consegui ler esses arquivos."; } }};rd.readAsText(f);});
}

carregar();
</script>
